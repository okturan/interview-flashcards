version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      i18n-major:
        patterns:
          - i18next
          - i18next-http-backend
          - react-i18next
        update-types:
          - major
      compatible-npm-updates:
        patterns:
          - "*"
        update-types:
          - minor
          - patch
    ignore:
      # Plugin 5.2 already supports Vite 8. Plugin 6 currently installs an
      # optional Babel peer set that npm cannot resolve alongside the PWA
      # toolchain; keep the proven compatible major until that graph settles.
      - dependency-name: "@vitejs/plugin-react"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
